services:
  # Nginx Proxy Manager - Der Türsteher
  nginx-proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: messerschmiede-nginx-proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./nginx/data:/data
      - ./nginx/letsencrypt:/etc/letsencrypt

  # Dein Frontend (React/Vite)
  frontend:
    build: ./frontend
    container_name: messerschmiede-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Dein Backend (Node.js)
  backend:
    build: ./backend
    container_name: messerschmiede-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://marcel:schmiede2024@db:5432/messerschmiede_db
    volumes:
      - ./backend:/app
      # DIE TÜR: Wir mounten den public-Ordner des Frontends in den Backend-Container
      - ./frontend/public:/frontend/public
    depends_on:
      - db

  # Die Datenbank (PostgreSQL)
  db:
    image: postgres:15
    container_name: messerschmiede-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=marcel
      - POSTGRES_PASSWORD=e`RqjC6W1(k1
      - POSTGRES_DB=messerschmiede_db
    volumes:
      - messer_daten:/var/lib/postgresql/data

volumes:
  messer_daten: