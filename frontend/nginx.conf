server {
    listen 80;
    server_name localhost; 

    # Gzip Komprimierung
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Haupt-Block für React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Spezieller Block für die Sitemap
    location = /sitemap.xml {
        root /usr/share/nginx/html;
        allow all;
    }

    # Cache-Control für Assets (Vite generiert diese im /assets/ Ordner)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SCHUTZ VOR BILDERSUCHE: Favicons & Icons
    # Hier fügen wir den X-Robots-Tag hinzu, damit Google diese Bilder ignoriert
    location ~ ^/(favicon\.ico|favicon\.svg|favicon-96x96\.png|apple-touch-icon\.png|site\.webmanifest|robots\.txt)$ {
        root /usr/share/nginx/html;
        access_log off;
        log_not_found off;
        expires 30d;
        add_header X-Robots-Tag "noindex, noimageindex";
        add_header Cache-Control "public, no-transform";
    }

    # Deine Standard Produkt-Bilder
    location /api/images/ {
        alias /pfad/zu/deinen/bildern/; 
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # NEU: Galerie-Bilder & Videos
    location /api/images/gallery/ {
        alias /pfad/zu/deinen/bildern/gallery/; # Pfad zum neuen Gallery-Ordner
        
        # Wichtig für Videos: Erlaubt das "Vorspulen" im Browser (Range Requests)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        
        expires 30d;
        add_header Cache-Control "public, no-transform";
        
        # MIME-Types für Videos sicherstellen
        types {
            video/mp4 mp4;
            video/quicktime mov;
        }

        access_log off;
        log_not_found off;
    }
    client_max_body_size 2000M;
}