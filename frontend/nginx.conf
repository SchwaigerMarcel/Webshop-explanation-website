server {
    listen 80;
    server_name localhost; # Hier später deine echte Domain eintragen, falls nötig

    # Gzip Komprimierung (behalten wir bei, ist super für SEO/Speed)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Haupt-Block für React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # Das hier sucht erst nach der echten Datei (sitemap.xml), 
        # dann nach dem Ordner, und schickt erst DANN alles an React.
        try_files $uri $uri/ /index.html;
    }

    # Spezieller Block für die Sitemap (Sicherheitsnetz)
    location = /sitemap.xml {
        root /usr/share/nginx/html;
        allow all;
    }

    # Cache-Control für Assets
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deine Bilder-API
    location /api/images/ {
        # WICHTIG: Ersetze /pfad/zu/deinen/bildern/ durch den ECHTEN Pfad im Docker-Container oder auf dem Pi!
        alias /pfad/zu/deinen/bildern/; 
        
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        log_not_found off;
    }
}